<style>
    body {
      min-height: 100dvh;
      overflow-x: hidden;
    }

    @keyframes sway {
      0%, 100% { transform: scale(1.1) rotate(0deg); }
      50% { transform: scale(1.1) rotate(1deg); }
    }

    @keyframes drift {
      0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(110vh) translateX(100px) rotate(360deg); opacity: 0; }
    }

    @keyframes fadeUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes tailFlick {
      0%, 100% { transform: rotate(0deg); }
      10%, 20% { transform: rotate(-5deg); }
      15% { transform: rotate(5deg); }
    }

    .bg-sway {
      animation: sway 15s ease-in-out infinite;
      transform-origin: center bottom;
    }

    .petal {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      width: 12px;
      height: 12px;
      background: #ffdce5;
      border-radius: 50% 0 50% 50%;
      opacity: 0;
    }

    .stagger-card {
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .cat-tail {
      animation: tailFlick 5s ease-in-out infinite;
      transform-origin: center bottom;
    }

    @media (prefers-reduced-motion: reduce) {
      .bg-sway, .petal, .stagger-card, .cat-tail {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>

<script>
    function createPetals() {
      const container = document.getElementById('petals-container');
      const count = 15;
      for (let i = 0; i < count; i++) {
        const petal = document.createElement('div');
        petal.className = 'petal';
        const left = Math.random() * 100;
        const duration = 10 + Math.random() * 20;
        const delay = Math.random() * 20;
        const size = 6 + Math.random() * 8;
        
        petal.style.left = `${left}%`;
        petal.style.width = `${size}px`;
        petal.style.height = `${size}px`;
        petal.style.animation = `drift ${duration}s linear ${delay}s infinite`;
        container.appendChild(petal);
      }
    }
    createPetals();

    function toggleLike(btn) {
      const img = btn.querySelector('img');
      const isLiked = btn.getAttribute('data-liked') === 'true';
      if (isLiked) {
        img.src = 'assets/images/local-remote/remote-a665a2335681.jpg';
        btn.setAttribute('data-liked', 'false');
      } else {
        img.src = 'assets/images/local-remote/remote-c48a14460e99.jpg';
        btn.setAttribute('data-liked', 'true');
      }
    }
  </script>
