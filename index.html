<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Daily Rhythm Check-in</title>
    <link rel="stylesheet" href="./app.css?v=20260630c" />
  </head>
  <body>
    <main class="stage" aria-label="Daily Rhythm Check-in mobile preview">
      <section class="phone is-locked" aria-label="Mobile app">
        <iframe id="screen-frame" title="Daily Rhythm Check-in screen"></iframe>
        <section class="password-gate" aria-label="Password gate">
          <label class="password-panel" for="password-input" aria-label="输入密码">
            <span class="password-label">输入密码：</span>
            <input
              id="password-input"
              class="password-input"
              inputmode="numeric"
              pattern="[0-9]*"
              autocomplete="one-time-code"
              maxlength="4"
              placeholder="□□□□"
              aria-label="输入密码"
            />
          </label>
        </section>
      </section>
    </main>
    <script src="./app.js?v=20260630c"></script>
  </body>
</html>
