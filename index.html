<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Daily Rhythm Check-in</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <main class="stage" aria-label="Daily Rhythm Check-in mobile preview">
      <section class="phone is-locked" aria-label="Mobile app">
        <iframe id="screen-frame" title="Daily Rhythm Check-in screen"></iframe>
        <section class="password-gate" aria-label="Password gate">
          <label class="password-panel" for="password-input">
            <span class="password-label">输入密码：</span>
            <span class="password-boxes" aria-hidden="true">
              <span class="password-box"></span>
              <span class="password-box"></span>
              <span class="password-box"></span>
              <span class="password-box"></span>
            </span>
            <input
              id="password-input"
              class="password-input"
              inputmode="numeric"
              autocomplete="one-time-code"
              maxlength="4"
              aria-label="输入密码"
            />
          </label>
        </section>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
