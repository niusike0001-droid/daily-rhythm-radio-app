<style>
        .spin-slow {
            animation: spin 10s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        .vinyl-grooves {
            background: repeating-radial-gradient(
                #1a1c1d 0,
                #1a1c1d 2px,
                #1c1b1b 3px,
                #1c1b1b 4px
            );
        }
        body {
            min-height: 100dvh;
            height: 100dvh;
            overflow: hidden;
            overscroll-behavior: none;
        }
        
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .cat-idle {
            animation: breathe 3s ease-in-out infinite;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            z-index: 100;
        }
        @keyframes particle-fade {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tw-translate-x), var(--tw-translate-y)) scale(0); opacity: 0; }
        }
        .radio-title {
            position: fixed;
            top: 10px;
            left: 8px;
            right: 8px;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            color: #fff;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.35));
        }
        .cat-title-badge {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            max-width: calc(100vw - 24px);
            min-height: 44px;
            padding: 8px 13px;
            background: #000;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.82);
            box-shadow: 0 6px 20px rgba(0,0,0,0.28);
            white-space: nowrap;
        }
        .cat-title-name {
            display: inline-block;
            margin-right: 4px;
            font-family: "Microsoft YaHei UI", "Microsoft YaHei", "SimHei", "Noto Sans SC", Arial, sans-serif;
            font-size: 25px;
            line-height: 1.18;
            font-weight: 900;
            letter-spacing: 0;
            text-rendering: geometricPrecision;
        }
        .radio-title-rest {
            margin-left: 0;
            font-size: 16px;
            line-height: 1;
            font-weight: 800;
            white-space: nowrap;
        }
        .album-frame {
            position: absolute;
            inset: -2px;
            width: calc(100% + 4px);
            height: calc(100% + 4px);
            object-fit: contain;
            z-index: 8;
            pointer-events: none;
        }
        .album-art-shell {
            position: absolute;
            inset: 15.5%;
            overflow: hidden;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.86);
            background: #eee;
            z-index: 5;
            box-shadow: 0 0 0 7px rgba(0,0,0,0.16);
        }
        .album-module {
            border-radius: 24px;
            overflow: visible;
        }
        @media (max-width: 380px) {
            .cat-title-badge {
                padding-inline: 10px;
            }
            .cat-title-name { font-size: 23px; }
            .radio-title-rest {
                font-size: 14px;
            }
        }
    </style>

<script>
    function openRoute(event, route) {
        if (event) {
            event.preventDefault();
            createExplosion(event);
        }
        if (window.parent && window.parent !== window && typeof window.parent.dailyGo === 'function') {
            window.parent.dailyGo(route);
        } else {
            window.location.href = route === 'player' ? '../#player' : `../#${route}`;
        }
    }

    const standaloneAudio = window.parent === window || !window.parent.dailyPlayer ? new Audio('../assets/audio/001.mp3') : null;
    if (standaloneAudio) standaloneAudio.preload = 'auto';
    let detachParentPlayer = null;

    function getDailyPlayer() {
        if (window.parent && window.parent !== window && window.parent.dailyPlayer) {
            return window.parent.dailyPlayer;
        }
        return {
            play() {
                if (standaloneAudio.readyState === 0) standaloneAudio.load();
                return standaloneAudio.play().then(() => true).catch(() => false);
            },
            pause() {
                standaloneAudio.pause();
                return Promise.resolve(false);
            },
            toggle() {
                if (standaloneAudio.paused) return this.play();
                standaloneAudio.pause();
                return Promise.resolve(false);
            },
            seekRatio(ratio) {
                if (!standaloneAudio.duration) return;
                standaloneAudio.currentTime = Math.min(Math.max(ratio, 0), 1) * standaloneAudio.duration;
            },
            getState() {
                return {
                    currentTime: Number.isFinite(standaloneAudio.currentTime) ? standaloneAudio.currentTime : 0,
                    duration: Number.isFinite(standaloneAudio.duration) ? standaloneAudio.duration : 0,
                    paused: standaloneAudio.paused,
                };
            },
            addListener(listener) {
                const update = () => listener(this.getState());
                ['loadedmetadata', 'durationchange', 'timeupdate', 'play', 'pause', 'ended', 'seeked'].forEach((eventName) => {
                    standaloneAudio.addEventListener(eventName, update);
                });
                update();
                return () => {
                    ['loadedmetadata', 'durationchange', 'timeupdate', 'play', 'pause', 'ended', 'seeked'].forEach((eventName) => {
                        standaloneAudio.removeEventListener(eventName, update);
                    });
                };
            },
        };
    }

    function formatTime(seconds) {
        if (!Number.isFinite(seconds)) return '00:00';
        const minutes = Math.floor(seconds / 60);
        const remainingSeconds = Math.floor(seconds % 60);
        return `${minutes}:${String(remainingSeconds).padStart(2, '0')}`;
    }

    function setPlayingState(isPlaying) {
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        playIcon.classList.toggle('hidden', !isPlaying);
        pauseIcon.classList.toggle('hidden', isPlaying);
    }

    function updateProgress(state = getDailyPlayer().getState()) {
        const currentTime = document.getElementById('currentTime');
        const durationTime = document.getElementById('durationTime');
        const progressFill = document.getElementById('progressFill');
        const progressThumb = document.getElementById('progressThumb');
        const percent = state.duration ? Math.min((state.currentTime / state.duration) * 100, 100) : 0;

        currentTime.textContent = formatTime(state.currentTime);
        durationTime.textContent = formatTime(state.duration);
        progressFill.style.width = `${percent}%`;
        progressThumb.style.left = `${percent}%`;
        setPlayingState(!state.paused);
    }

    function playDailyTrack() {
        return getDailyPlayer().play().then(() => {
            setPlayingState(true);
            return true;
        }).catch(() => {
            setPlayingState(false);
            return false;
        });
    }

    function togglePlay(e) {
        getDailyPlayer().toggle().then((isPlaying) => setPlayingState(Boolean(isPlaying)));
        if (e) createExplosion(e);
    }

    const progressTrack = document.getElementById('progressTrack');
    let isScrubbing = false;

    function scrubTo(clientX) {
        const player = getDailyPlayer();
        const state = player.getState();
        if (!state.duration) return;
        const rect = progressTrack.getBoundingClientRect();
        const ratio = Math.min(Math.max((clientX - rect.left) / rect.width, 0), 1);
        player.seekRatio(ratio);
        updateProgress(player.getState());
    }

    progressTrack.addEventListener('pointerdown', (event) => {
        isScrubbing = true;
        scrubTo(event.clientX);
        try {
            progressTrack.setPointerCapture(event.pointerId);
        } catch (error) {
            // Synthetic pointer events do not always support capture; real touch/mouse input still works.
        }
    });

    progressTrack.addEventListener('pointermove', (event) => {
        if (!isScrubbing) return;
        scrubTo(event.clientX);
    });

    progressTrack.addEventListener('pointerup', (event) => {
        if (!isScrubbing) return;
        scrubTo(event.clientX);
        isScrubbing = false;
        try {
            progressTrack.releasePointerCapture(event.pointerId);
        } catch (error) {}
    });

    progressTrack.addEventListener('pointercancel', () => {
        isScrubbing = false;
    });

    progressTrack.addEventListener('click', (event) => {
        scrubTo(event.clientX);
    });

    function dailyAttachParentPlayer() {
        if (detachParentPlayer) detachParentPlayer();
        detachParentPlayer = getDailyPlayer().addListener(updateProgress);
        updateProgress();
    }

    dailyAttachParentPlayer();
    window.playDailyTrack = playDailyTrack;
    window.dailyAttachParentPlayer = dailyAttachParentPlayer;

    function createExplosion(e) {
        const colors = ['#FF0000', '#FF7F00', '#FFFF00', '#00FF00', '#0000FF', '#4B0082', '#8B00FF'];
        const button = e.currentTarget;
        const rect = button.getBoundingClientRect();
        const x = rect.left + rect.width / 2;
        const y = rect.top + rect.height / 2;

        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const color = colors[Math.floor(Math.random() * colors.length)];
            p.style.backgroundColor = color;
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            
            const destX = (Math.random() - 0.5) * 200;
            const destY = (Math.random() - 0.5) * 200;
            
            p.style.setProperty('--tw-translate-x', `${destX}px`);
            p.style.setProperty('--tw-translate-y', `${destY}px`);
            p.style.animation = `particle-fade ${0.5 + Math.random() * 0.5}s ease-out forwards`;
            
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 1000);
        }
    }
</script>




<input type="file" id="artwork-upload" accept="image/*" class="hidden" onchange="const file = this.files[0]; if (file) { const reader = new FileReader(); reader.onload = (e) =&gt; { document.querySelector('.vinyl-artwork-img').src = e.target.result; }; reader.readAsDataURL(file); }">
